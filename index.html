<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NoteMindAI is a calm AI study workspace for turning class notes into clear answers, summaries, and focused revision."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>NoteMindAI</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function restoreGitHubPagesRoute(location) {
        if (location.search[1] !== '/') return;

        var decodedPath = location.search
          .slice(1)
          .split('&')
          .map(function decodeRoute(part) {
            return part.replace(/~and~/g, '&');
          })
          .join('?');

        window.history.replaceState(null, null, location.pathname.slice(0, -1) + decodedPath + location.hash);
      })(window.location);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
